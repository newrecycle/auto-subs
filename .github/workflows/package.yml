name: Package AutoSubs for MacOS and Linux
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for'
        required: true
        type: string

permissions:
  contents: write
 
env:
  # Resolve tag for both release-triggered and manual runs
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AutoSubs Repo Code
        uses: actions/checkout@v4
 
      - name: Install Vulkan SDK (for glslc)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          CODENAME="$(. /etc/os-release && echo "${VERSION_CODENAME:-}")"
          if [ -z "$CODENAME" ]; then
            CODENAME="$(lsb_release -cs || echo noble)"
          fi

          # Add LunarG signing key to a keyring
          curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/lunarg-archive-keyring.gpg >/dev/null

          # Remove any existing LunarG lists to avoid duplicate/conflicting entries
          sudo rm -f /etc/apt/sources.list.d/lunarg-vulkan*.list || true

          # Add a single apt source entry with signed-by to avoid conflicts
          echo "deb [signed-by=/usr/share/keyrings/lunarg-archive-keyring.gpg] https://packages.lunarg.com/vulkan $CODENAME main" \
            | sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list >/dev/null

          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

          glslc --version

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            libvulkan-dev \
            mesa-vulkan-drivers \
            unzip \
            libfuse2

      - name: Download ffmpeg/ffprobe binaries (Linux)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries

          ZIP_NAME="ffmpeg-x86_64-unknown-linux-gnu.zip"
          FFMPEG_SRC="ffmpeg-x86_64-unknown-linux-gnu"

          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "$ZIP_NAME" \
            --clobber

          unzip -jo "$ZIP_NAME"
          chmod +x "$FFMPEG_SRC"
          rm -f "$ZIP_NAME"

      - name: Install NPM deps
        run: |
          cd AutoSubs-App
          npm install

      - name: Build Tauri (Linux x86_64)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          cd AutoSubs-App
          export TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          # Disable default features (mac-specific) for Linux build
          npm run tauri build -- -- --no-default-features --features linux

      - name: Collect Linux artifacts
        run: |
          set -euo pipefail
          LINUX_BUNDLE_DIR="AutoSubs-App/src-tauri/target/release/bundle"

          # Debian package
          DEB_FILE=$(ls -1 "$LINUX_BUNDLE_DIR/deb"/*.deb 2>/dev/null | head -n1 || true)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" "AutoSubs-linux-x86_64.deb"
          else
            echo "WARNING: .deb package not found in $LINUX_BUNDLE_DIR/deb"
          fi

          # AppImage
          APPIMAGE_FILE=$(ls -1 "$LINUX_BUNDLE_DIR/appimage"/*.AppImage 2>/dev/null | head -n1 || true)
          if [ -n "$APPIMAGE_FILE" ]; then
            cp "$APPIMAGE_FILE" "AutoSubs-linux-x86_64.AppImage"
          else
            echo "WARNING: .AppImage not found in $LINUX_BUNDLE_DIR/appimage"
          fi

          # AppImage updater signature (createUpdaterArtifacts: true produces .AppImage + .AppImage.sig)
          APPIMAGE_SIG=$(ls -1 "$LINUX_BUNDLE_DIR/appimage"/*.AppImage.sig 2>/dev/null | head -n1 || true)
          if [ -n "$APPIMAGE_SIG" ]; then
            cp "$APPIMAGE_SIG" "AutoSubs-linux-x86_64.AppImage.sig"
          else
            echo "WARNING: AppImage updater signature not found"
          fi

      - name: Upload .deb artifact for Flatpak job
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: AutoSubs-linux-x86_64.deb
          retention-days: 1

      - name: Upload Linux artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AutoSubs-linux-x86_64.deb
            AutoSubs-linux-x86_64.AppImage
            AutoSubs-linux-x86_64.AppImage.sig
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout AutoSubs Repo Code
        uses: actions/checkout@v4

      - name: Install LLVM and Vulkan SDK
        shell: pwsh
        run: |
          choco install -y llvm vulkan-sdk
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (!(Test-Path $llvmBin)) {
            Write-Error "LLVM bin directory not found at $llvmBin"
            exit 1
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if (-not $env:VULKAN_SDK) {
            $vulkanRoot = Get-ChildItem "C:\VulkanSDK" -Directory -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
            if ($vulkanRoot) {
              "VULKAN_SDK=$vulkanRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "$vulkanRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          } else {
            "$env:VULKAN_SDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          glslc --version
          clang --version

      - name: Install NPM dependencies
        working-directory: AutoSubs-App
        run: npm install

      - name: Download ffmpeg/ffprobe binaries (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $binDir = "AutoSubs-App/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Set-Location $binDir

          $zipName = "ffmpeg-x86_64-pc-windows-msvc.zip"
          gh release download `
            --repo tmoroney/ffmpeg-binaries `
            --pattern $zipName `
            --clobber

          Expand-Archive -Path $zipName -DestinationPath . -Force
          Remove-Item $zipName -Force

      - name: Disable Windows code signing for CI builds
        shell: pwsh
        run: |
          $configPath = "AutoSubs-App/src-tauri/tauri.conf.json"
          $json = Get-Content $configPath -Raw | ConvertFrom-Json
          if ($json.bundle.windows) {
            $json.bundle.windows.PSObject.Properties.Remove("certificateThumbprint")
            $json.bundle.windows.PSObject.Properties.Remove("timestampUrl")
            $json.bundle.windows.PSObject.Properties.Remove("digestAlgorithm")
            $json.bundle.windows.PSObject.Properties.Remove("signCommand")
          }
          $json | ConvertTo-Json -Depth 100 | Set-Content -Path $configPath -Encoding utf8

      - name: Build Tauri (Windows x86_64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: AutoSubs-App
        run: npm run tauri build -- -- --no-default-features --features windows

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $bundleDir = "AutoSubs-App/src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$bundleDir/*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) {
            Write-Error "NSIS installer .exe not found in $bundleDir"
            exit 1
          }
          Copy-Item $exe.FullName "AutoSubs-windows-x86_64.exe" -Force

          $sig = Get-ChildItem "$bundleDir/*.exe.sig" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($sig) {
            Copy-Item $sig.FullName "AutoSubs-windows-x86_64.exe.sig" -Force
          } else {
            Write-Warning "Updater signature .exe.sig not found"
          }

      - name: Upload Windows artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AutoSubs-windows-x86_64.exe
            AutoSubs-windows-x86_64.exe.sig
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}

  build-linux-flatpak:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: flatpak-build/

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Prepare Flatpak build directory
        run: |
          cp flatpak/org.autosubs.AutoSubs.yml flatpak-build/
          cp flatpak/org.autosubs.AutoSubs.desktop flatpak-build/

      - name: Build Flatpak bundle
        run: |
          cd flatpak-build
          flatpak-builder --user --install-deps-from=flathub --force-clean build-dir org.autosubs.AutoSubs.yml
          flatpak build-export repo build-dir
          flatpak build-bundle repo AutoSubs-linux-x86_64.flatpak org.autosubs.AutoSubs

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        with:
          files: flatpak-build/AutoSubs-linux-x86_64.flatpak
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}

  compose-latest-json:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Compose latest.json with macOS and Windows artifacts
        env:
          TAG: ${{ env.TAG }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "ERROR: TAG is empty. Ensure this workflow is triggered from a Release event or provide the 'tag' input when using workflow_dispatch."
            exit 1
          fi
          mkdir -p latest

          # Download signature files from the release assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "AutoSubs-macos-aarch64.app.tar.gz.sig" \
            --dir latest \
            --clobber

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "AutoSubs-macos-x86_64.app.tar.gz.sig" \
            --dir latest \
            --clobber

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "AutoSubs-windows-x86_64.exe.sig" \
            --dir latest \
            --clobber || true

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "AutoSubs-linux-x86_64.AppImage.sig" \
            --dir latest \
            --clobber || true

          ARM_SIG="$(cat latest/AutoSubs-macos-aarch64.app.tar.gz.sig)"
          INTEL_SIG="$(cat latest/AutoSubs-macos-x86_64.app.tar.gz.sig)"
          WINDOWS_SIG="$(cat latest/AutoSubs-windows-x86_64.exe.sig 2>/dev/null || true)"
          LINUX_SIG="$(cat latest/AutoSubs-linux-x86_64.AppImage.sig 2>/dev/null || true)"

          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          NOTES='${{ github.event.release.name }}'

          JSON_OUTPUT=$(jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "$NOTES" \
            --arg arm_sig "$ARM_SIG" \
            --arg intel_sig "$INTEL_SIG" \
            --arg windows_sig "$WINDOWS_SIG" \
            --arg linux_sig "$LINUX_SIG" \
            --arg tag "$TAG" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "darwin-aarch64": {
                  signature: $arm_sig,
                  url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/AutoSubs-macos-aarch64.app.tar.gz")
                },
                "darwin-x86_64": {
                  signature: $intel_sig,
                  url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/AutoSubs-macos-x86_64.app.tar.gz")
                },
                "windows-x86_64": (
                  if ($windows_sig | length) > 0 then
                    { signature: $windows_sig,
                      url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/AutoSubs-windows-x86_64.exe") }
                  else empty end
                ),
                "linux-x86_64": (
                  if ($linux_sig | length) > 0 then
                    { signature: $linux_sig,
                      url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/AutoSubs-linux-x86_64.AppImage") }
                  else empty end
                )
              }
            }')
          echo "$JSON_OUTPUT" > latest.json

      - name: Upload unified latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}
